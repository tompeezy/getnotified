<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000308">
<title>J.A.R.V.I.S.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #00d4ff;
  --blue-dim: #0066aa;
  --blue-bright: #80eeff;
  --cyan: #00ffff;
  --white-blue: #c0f0ff;
  --glow: rgba(0, 212, 255, 0.6);
  --bg: #000308;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Rajdhani', sans-serif;
  color: var(--blue);
  touch-action: none;
  user-select: none;
}

#three-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

#ui {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* HUD corner decorations */
.hud-corner {
  position: fixed;
  width: 60px; height: 60px;
  pointer-events: none;
  z-index: 10;
  opacity: 0.5;
}
.hud-corner svg { width: 100%; height: 100%; }
.hud-tl { top: 16px; left: 16px; }
.hud-tr { top: 16px; right: 16px; transform: scaleX(-1); }
.hud-bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
.hud-br { bottom: 16px; right: 16px; transform: scale(-1,-1); }

/* Response text */
#response-text {
  position: fixed;
  top: 12%;
  left: 50%;
  transform: translateX(-50%);
  width: min(600px, 88vw);
  text-align: center;
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(14px, 2.5vw, 20px);
  font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--white-blue);
  text-shadow: 0 0 20px rgba(0,212,255,0.8);
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
  z-index: 15;
  line-height: 1.6;
}
#response-text.visible { opacity: 1; }

/* Orb click area */
#orb-tap {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(340px, 70vw);
  height: min(340px, 70vw);
  border-radius: 50%;
  cursor: pointer;
  z-index: 20;
  pointer-events: all;
  background: transparent;
}

/* Label below orb */
#orb-label {
  position: fixed;
  bottom: calc(50% - min(210px, 42vw));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  pointer-events: none;
  z-index: 15;
}

#cool-text {
  font-family: 'Orbitron', monospace;
  font-size: clamp(14px, 3vw, 22px);
  font-weight: 700;
  letter-spacing: 0.6em;
  color: var(--blue);
  text-shadow: 0 0 15px rgba(0,212,255,0.7), 0 0 40px rgba(0,212,255,0.3);
  padding-right: 0.6em;
}

#status-text {
  font-family: 'Orbitron', monospace;
  font-size: clamp(9px, 1.5vw, 13px);
  font-weight: 400;
  letter-spacing: 0.35em;
  color: rgba(0, 212, 255, 0.6);
  text-transform: uppercase;
  transition: color 0.5s ease, text-shadow 0.5s ease;
}
#status-text.active {
  color: var(--cyan);
  text-shadow: 0 0 10px rgba(0,255,255,0.8);
}

/* Settings panel */
#gear-btn {
  position: fixed;
  top: 20px; right: 20px;
  width: 40px; height: 40px;
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
  pointer-events: all;
  transition: background 0.2s, border-color 0.2s;
}
#gear-btn:hover { background: rgba(0,212,255,0.18); border-color: rgba(0,212,255,0.5); }
#gear-btn svg { width: 20px; height: 20px; fill: var(--blue); }

#settings-panel {
  position: fixed;
  top: 0; right: -340px;
  width: 320px; height: 100%;
  background: rgba(0, 8, 20, 0.92);
  border-left: 1px solid rgba(0,212,255,0.2);
  backdrop-filter: blur(20px);
  z-index: 100;
  transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  padding: 20px;
  display: flex; flex-direction: column; gap: 20px;
  pointer-events: all;
  overflow-y: auto;
}
#settings-panel.open { right: 0; }

.settings-title {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: var(--blue);
  border-bottom: 1px solid rgba(0,212,255,0.2);
  padding-bottom: 12px;
  margin-top: 8px;
}

.settings-row {
  display: flex; flex-direction: column; gap: 8px;
}
.settings-label {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(0,212,255,0.6);
  text-transform: uppercase;
}
.settings-control {
  background: rgba(0,212,255,0.05);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 4px;
  padding: 8px 12px;
  color: var(--blue);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  width: 100%;
  cursor: pointer;
}
.settings-control:focus { outline: none; border-color: var(--blue); }
select.settings-control option { background: #000a18; }

.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
}
.toggle {
  position: relative;
  width: 44px; height: 24px;
  cursor: pointer;
}
.toggle input { display: none; }
.toggle-slider {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,212,255,0.1);
  border: 1px solid rgba(0,212,255,0.3);
  border-radius: 24px;
  transition: 0.3s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  left: 3px; top: 3px;
  width: 16px; height: 16px;
  background: rgba(0,212,255,0.4);
  border-radius: 50%;
  transition: 0.3s;
}
.toggle input:checked + .toggle-slider { background: rgba(0,212,255,0.2); border-color: var(--blue); }
.toggle input:checked + .toggle-slider::before {
  transform: translateX(20px);
  background: var(--blue);
  box-shadow: 0 0 8px rgba(0,212,255,0.8);
}

#close-settings {
  background: rgba(0,212,255,0.05);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 4px;
  color: var(--blue);
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  padding: 10px;
  cursor: pointer;
  width: 100%;
  text-transform: uppercase;
  margin-top: auto;
}
#close-settings:hover { background: rgba(0,212,255,0.1); }

/* Listening pulse ring */
#listen-ring {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(360px, 74vw);
  height: min(360px, 74vw);
  border-radius: 50%;
  border: 2px solid rgba(0,212,255,0);
  pointer-events: none;
  z-index: 8;
  transition: border-color 0.4s, box-shadow 0.4s;
}
#listen-ring.active {
  border-color: rgba(0,212,255,0.4);
  box-shadow: 0 0 40px rgba(0,212,255,0.15), inset 0 0 40px rgba(0,212,255,0.05);
  animation: ringPulse 1.5s ease-in-out infinite;
}
@keyframes ringPulse {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1; }
  50% { transform: translate(-50%,-50%) scale(1.05); opacity:0.7; }
}
</style>
</head>
<body>

<!-- Three.js canvas -->
<canvas id="three-canvas"></canvas>

<!-- Listen ring -->
<div id="listen-ring"></div>

<!-- HUD Corners -->
<div class="hud-corner hud-tl">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 40 L2 2 L40 2" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
    <path d="M2 20 L2 2 L20 2" stroke="#00d4ff" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="2" cy="2" r="3" fill="#00d4ff" opacity="0.6"/>
  </svg>
</div>
<div class="hud-corner hud-tr">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 40 L2 2 L40 2" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
    <path d="M2 20 L2 2 L20 2" stroke="#00d4ff" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="2" cy="2" r="3" fill="#00d4ff" opacity="0.6"/>
  </svg>
</div>
<div class="hud-corner hud-bl">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 40 L2 2 L40 2" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
    <path d="M2 20 L2 2 L20 2" stroke="#00d4ff" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="2" cy="2" r="3" fill="#00d4ff" opacity="0.6"/>
  </svg>
</div>
<div class="hud-corner hud-br">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 40 L2 2 L40 2" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
    <path d="M2 20 L2 2 L20 2" stroke="#00d4ff" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="2" cy="2" r="3" fill="#00d4ff" opacity="0.6"/>
  </svg>
</div>

<!-- Response text -->
<div id="response-text"></div>

<!-- Orb tap zone -->
<div id="orb-tap" title="Tap to speak"></div>

<!-- Label below orb -->
<div id="orb-label">
  <div id="cool-text">C O O L</div>
  <div id="status-text">STANDBY</div>
</div>

<!-- Gear button -->
<button id="gear-btn" title="Settings">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.33.07-.67.07-1.08s-.03-.76-.07-1.1l2.37-1.86c.22-.17.27-.48.13-.72l-2.24-3.87c-.14-.24-.45-.32-.69-.22l-2.8 1.12c-.58-.44-1.21-.82-1.9-1.09L14.17 3c-.05-.26-.28-.5-.55-.5H9.38c-.27 0-.5.24-.55.5l-.43 2.96a9.3 9.3 0 0 0-1.9 1.09L3.7 6.43c-.24-.1-.55-.02-.69.22L.77 10.52c-.14.24-.1.55.13.72l2.37 1.86c-.05.34-.08.69-.08 1.1s.03.75.08 1.09l-2.37 1.85c-.23.17-.27.48-.13.73l2.24 3.86c.14.25.45.33.69.23l2.8-1.12c.58.44 1.21.82 1.9 1.1l.43 2.95c.05.27.28.5.55.5h4.47c.27 0 .5-.23.55-.5l.43-2.95a9.3 9.3 0 0 0 1.9-1.1l2.8 1.12c.24.1.55.02.69-.22l2.24-3.87c.14-.24.1-.55-.13-.72l-2.38-1.86z"/>
  </svg>
</button>

<!-- Settings Panel -->
<div id="settings-panel">
  <div class="settings-title">⚙ SYSTEM CONFIG</div>

  <div class="settings-row">
    <div class="settings-label">Voice Output</div>
    <select id="voice-select" class="settings-control"></select>
  </div>

  <div class="settings-row">
    <div class="toggle-row">
      <div class="settings-label">Auto-Listen After Response</div>
      <label class="toggle">
        <input type="checkbox" id="auto-listen-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="settings-row">
    <div class="toggle-row">
      <div class="settings-label">Wake Word "Cool"</div>
      <label class="toggle">
        <input type="checkbox" id="wake-word-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <button id="close-settings">CLOSE</button>
</div>

<script>
// ─────────────────────────────────────────────
//  THREE.JS ORB SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000308, 1);
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// ── State ──
const STATE = { IDLE: 'idle', LISTENING: 'listening', PROCESSING: 'processing', SPEAKING: 'speaking' };
let currentState = STATE.IDLE;
let speakIntensity = 0;
let clock = new THREE.Clock();

// ── Animation targets (smooth lerp) ──
let anim = {
  ringSpeed: 1.0,
  coreIntensity: 1.0,
  glowScale: 1.0,
  particleSpeed: 1.0,
  orbScale: 1.0,
  processingArms: 0.0,
  colorTemp: 0.0,  // 0=cyan, 1=warm white
};
let animTargets = { ...anim };

// ── Colors ──
const CYAN = new THREE.Color(0x00d4ff);
const WHITE_CYAN = new THREE.Color(0xc0f8ff);
const WARM_WHITE = new THREE.Color(0xe8f4ff);

// ─────────────────────────────────────────────
//  ICOSPHERE WIREFRAME
// ─────────────────────────────────────────────
const icoGeo = new THREE.IcosahedronGeometry(1.0, 3);
const icoMat = new THREE.MeshBasicMaterial({
  color: 0x00d4ff,
  wireframe: true,
  transparent: true,
  opacity: 0.18,
});
const icoMesh = new THREE.Mesh(icoGeo, icoMat);
scene.add(icoMesh);

// Second icosphere at slightly different subdivision for panel effect
const icoGeo2 = new THREE.IcosahedronGeometry(1.02, 2);
const icoMat2 = new THREE.MeshBasicMaterial({
  color: 0x0099cc,
  wireframe: true,
  transparent: true,
  opacity: 0.08,
});
const icoMesh2 = new THREE.Mesh(icoGeo2, icoMat2);
scene.add(icoMesh2);

// ─────────────────────────────────────────────
//  ROTATING RINGS (armillary sphere style)
// ─────────────────────────────────────────────
function makeRing(radiusOuter, tube, color, opacity) {
  const geo = new THREE.TorusGeometry(radiusOuter, tube, 6, 80);
  const mat = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  return new THREE.Mesh(geo, mat);
}

// Ring 1 — XY plane (equatorial)
const ring1 = makeRing(1.38, 0.008, 0x00d4ff, 0.9);
ring1.rotation.x = 0;
scene.add(ring1);

// Ring 2 — tilted ~70 degrees
const ring2 = makeRing(1.32, 0.006, 0x00aadd, 0.75);
ring2.rotation.x = Math.PI * 0.35;
ring2.rotation.y = Math.PI * 0.15;
scene.add(ring2);

// Ring 3 — near-polar
const ring3 = makeRing(1.35, 0.007, 0x0088cc, 0.65);
ring3.rotation.x = Math.PI * 0.45;
ring3.rotation.z = Math.PI * 0.3;
scene.add(ring3);

// Ring glow halos (wider, very transparent)
const ringHalo1 = makeRing(1.38, 0.025, 0x00d4ff, 0.12);
ringHalo1.rotation.x = 0;
scene.add(ringHalo1);

const ringHalo2 = makeRing(1.32, 0.022, 0x00aadd, 0.10);
ringHalo2.rotation.x = Math.PI * 0.35;
ringHalo2.rotation.y = Math.PI * 0.15;
scene.add(ringHalo2);

// ─────────────────────────────────────────────
//  INNER GLOW CORE
// ─────────────────────────────────────────────
// Innermost bright core
const coreGeo = new THREE.SphereGeometry(0.28, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.95,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const coreMesh = new THREE.Mesh(coreGeo, coreMat);
scene.add(coreMesh);

// Mid glow
const midGlowGeo = new THREE.SphereGeometry(0.55, 32, 32);
const midGlowMat = new THREE.MeshBasicMaterial({
  color: 0x40e0ff,
  transparent: true,
  opacity: 0.45,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const midGlowMesh = new THREE.Mesh(midGlowGeo, midGlowMat);
scene.add(midGlowMesh);

// Outer glow sphere (fills interior)
const innerGlowGeo = new THREE.SphereGeometry(0.85, 32, 32);
const innerGlowMat = new THREE.MeshBasicMaterial({
  color: 0x00d4ff,
  transparent: true,
  opacity: 0.18,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const innerGlowMesh = new THREE.Mesh(innerGlowGeo, innerGlowMat);
scene.add(innerGlowMesh);

// ─────────────────────────────────────────────
//  OUTER ATMOSPHERE (Fresnel-like edge glow)
// ─────────────────────────────────────────────
// Simulate Fresnel with multiple shells
const shells = [];
const shellConfigs = [
  { r: 1.12, op: 0.08, col: 0x00d4ff },
  { r: 1.22, op: 0.055, col: 0x0088cc },
  { r: 1.42, op: 0.03, col: 0x004488 },
  { r: 1.65, op: 0.015, col: 0x002244 },
];
for (const cfg of shellConfigs) {
  const g = new THREE.SphereGeometry(cfg.r, 32, 32);
  const m = new THREE.MeshBasicMaterial({
    color: cfg.col,
    transparent: true,
    opacity: cfg.op,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    depthWrite: false,
  });
  const mesh = new THREE.Mesh(g, m);
  scene.add(mesh);
  shells.push(mesh);
}

// ─────────────────────────────────────────────
//  PARTICLE SYSTEM (orbiting along ring paths)
// ─────────────────────────────────────────────
const PARTICLE_COUNT = 220;
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleSizes = new Float32Array(PARTICLE_COUNT);
const particlePhases = new Float32Array(PARTICLE_COUNT);
const particleRings = new Uint8Array(PARTICLE_COUNT); // which ring: 0,1,2

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const ring = i % 3;
  particleRings[i] = ring;
  particlePhases[i] = (i / PARTICLE_COUNT) * Math.PI * 2;
  particleSizes[i] = 3 + Math.random() * 4;
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

// Circular particle texture
const pCanvas = document.createElement('canvas');
pCanvas.width = pCanvas.height = 32;
const pCtx = pCanvas.getContext('2d');
const pGrad = pCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
pGrad.addColorStop(0, 'rgba(255,255,255,1)');
pGrad.addColorStop(0.3, 'rgba(0,212,255,0.8)');
pGrad.addColorStop(1, 'rgba(0,100,200,0)');
pCtx.fillStyle = pGrad;
pCtx.fillRect(0, 0, 32, 32);
const pTex = new THREE.CanvasTexture(pCanvas);

const particleMat = new THREE.PointsMaterial({
  size: 0.045,
  map: pTex,
  color: 0x00d4ff,
  transparent: true,
  opacity: 0.85,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─────────────────────────────────────────────
//  PROCESSING SCANNER ARMS
// ─────────────────────────────────────────────
const scannerArms = [];
for (let i = 0; i < 4; i++) {
  const armGeo = new THREE.TorusGeometry(1.5, 0.003, 4, 60, Math.PI * 0.15);
  const armMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const arm = new THREE.Mesh(armGeo, armMat);
  arm.rotation.y = (i / 4) * Math.PI * 2;
  scene.add(arm);
  scannerArms.push(arm);
}

// ─────────────────────────────────────────────
//  ORBITRON GROUP (all geometry)
// ─────────────────────────────────────────────
// Group for breathing/scale
const orbGroup = new THREE.Group();
orbGroup.add(icoMesh, icoMesh2, coreMesh, midGlowMesh, innerGlowMesh);
orbGroup.add(ring1, ring2, ring3, ringHalo1, ringHalo2);
for (const s of shells) orbGroup.add(s);
orbGroup.add(particles);
for (const a of scannerArms) orbGroup.add(a);
scene.add(orbGroup);

// ─────────────────────────────────────────────
//  ANIMATION STATE FUNCTIONS
// ─────────────────────────────────────────────
function setIdle() {
  currentState = STATE.IDLE;
  animTargets.ringSpeed = 1.0;
  animTargets.coreIntensity = 1.0;
  animTargets.glowScale = 1.0;
  animTargets.particleSpeed = 1.0;
  animTargets.processingArms = 0.0;
  animTargets.colorTemp = 0.0;
  updateStatus('STANDBY', false);
}

function setListening() {
  currentState = STATE.LISTENING;
  animTargets.ringSpeed = 3.5;
  animTargets.coreIntensity = 2.2;
  animTargets.glowScale = 1.18;
  animTargets.particleSpeed = 2.8;
  animTargets.processingArms = 0.0;
  animTargets.colorTemp = 0.1;
  updateStatus('LISTENING', true);
}

function setProcessing() {
  currentState = STATE.PROCESSING;
  animTargets.ringSpeed = 2.0;
  animTargets.coreIntensity = 1.8;
  animTargets.glowScale = 1.08;
  animTargets.particleSpeed = 1.5;
  animTargets.processingArms = 1.0;
  animTargets.colorTemp = 0.6;
  updateStatus('PROCESSING', true);
}

function setSpeaking(intensity = 0.5) {
  currentState = STATE.SPEAKING;
  speakIntensity = intensity;
  animTargets.ringSpeed = 1.5 + intensity * 1.5;
  animTargets.coreIntensity = 1.4 + intensity * 1.2;
  animTargets.glowScale = 1.0 + intensity * 0.1;
  animTargets.particleSpeed = 2.0 + intensity;
  animTargets.processingArms = 0.0;
  animTargets.colorTemp = 0.2;
  updateStatus('SPEAKING', true);
}

function updateStatus(text, active) {
  const el = document.getElementById('status-text');
  el.textContent = text;
  el.classList.toggle('active', active);
}

// ─────────────────────────────────────────────
//  MAIN ANIMATION LOOP
// ─────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  t += delta;

  // Lerp anim toward targets
  const lerpRate = 1 - Math.pow(0.02, delta);
  for (const key of Object.keys(anim)) {
    anim[key] += (animTargets[key] - anim[key]) * lerpRate;
  }

  // Breathing pulse (5-8% size variation)
  const breathFreq = currentState === STATE.IDLE ? 0.4 : 0.7;
  const breathAmp = currentState === STATE.SPEAKING ? 0.07 + speakIntensity * 0.06 : 0.05;
  const breath = 1.0 + Math.sin(t * breathFreq * Math.PI * 2) * breathAmp;
  orbGroup.scale.setScalar(breath * anim.glowScale);

  // Rotate icospheres (slow graceful rotation)
  const icoSpeed = 0.08 * anim.ringSpeed * 0.3;
  icoMesh.rotation.y += delta * icoSpeed;
  icoMesh.rotation.x += delta * icoSpeed * 0.4;
  icoMesh2.rotation.y -= delta * icoSpeed * 0.7;
  icoMesh2.rotation.z += delta * icoSpeed * 0.3;

  // Ring rotations (each at different speed/axis)
  const rs = anim.ringSpeed;
  ring1.rotation.z += delta * 0.22 * rs;
  ring1.rotation.y += delta * 0.05 * rs;
  ring2.rotation.z += delta * -0.17 * rs;
  ring2.rotation.x += delta * 0.08 * rs;
  ring3.rotation.y += delta * 0.19 * rs;
  ring3.rotation.z += delta * 0.06 * rs;
  ringHalo1.rotation.z = ring1.rotation.z;
  ringHalo1.rotation.y = ring1.rotation.y;
  ringHalo2.rotation.z = ring2.rotation.z;
  ringHalo2.rotation.x = ring2.rotation.x;

  // Core glow pulsing
  const coreBreath = 0.8 + Math.sin(t * 2.1) * 0.2;
  coreMat.opacity = Math.min(0.98, 0.75 * anim.coreIntensity * coreBreath);
  midGlowMat.opacity = 0.35 * anim.coreIntensity * coreBreath;
  innerGlowMat.opacity = 0.14 * anim.coreIntensity;

  // Color temperature shift
  const coreColor = new THREE.Color().lerpColors(WHITE_CYAN, WARM_WHITE, anim.colorTemp);
  coreMat.color.copy(coreColor);

  // Ring color/opacity by state
  const ringGlow = 0.7 + Math.sin(t * 3) * 0.15 * (rs - 1) / 3;
  icoMat.opacity = 0.14 + 0.06 * (rs / 4);
  ring1.material.opacity = Math.min(0.95, 0.85 * ringGlow * anim.coreIntensity * 0.6);
  ring2.material.opacity = Math.min(0.85, 0.75 * ringGlow * anim.coreIntensity * 0.55);
  ring3.material.opacity = Math.min(0.75, 0.65 * ringGlow * anim.coreIntensity * 0.5);

  // Outer shells glow
  const shellBase = anim.glowScale * 0.9;
  for (let i = 0; i < shells.length; i++) {
    shells[i].material.opacity = shellConfigs[i].op * shellBase * anim.coreIntensity * 0.7;
  }

  // Update particles
  const posArr = particleGeo.attributes.position.array;
  const pSpeed = anim.particleSpeed;

  const ringDefs = [
    // ring 0: equatorial (XZ plane)
    { radius: 1.38, tilt: new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, 0)) },
    // ring 1
    { radius: 1.32, tilt: new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI * 0.35, Math.PI * 0.15, 0)) },
    // ring 2
    { radius: 1.35, tilt: new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI * 0.45, 0, Math.PI * 0.3)) },
  ];

  const ringRotSpeeds = [
    ring1.rotation.z,
    ring2.rotation.z,
    ring3.rotation.y,
  ];

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const ri = particleRings[i];
    const def = ringDefs[ri];
    // Angle based on phase + time + ring rotation
    const angle = particlePhases[i] + t * pSpeed * (0.6 + ri * 0.15) * (ri === 1 ? -1 : 1);

    // Position on ring in local space
    const lx = Math.cos(angle) * def.radius;
    const lz = Math.sin(angle) * def.radius;
    const ly = 0;

    // Apply tilt
    const v = new THREE.Vector3(lx, ly, lz).applyQuaternion(def.tilt);

    posArr[i * 3] = v.x;
    posArr[i * 3 + 1] = v.y;
    posArr[i * 3 + 2] = v.z;
  }
  particleGeo.attributes.position.needsUpdate = true;

  // Particle color by state
  particleMat.color.lerpColors(CYAN, WARM_WHITE, anim.colorTemp * 0.4);
  particleMat.opacity = 0.7 + 0.3 * (anim.ringSpeed / 4);

  // Scanner arms (processing state)
  for (let i = 0; i < 4; i++) {
    const arm = scannerArms[i];
    arm.rotation.y = (i / 4) * Math.PI * 2 + t * 1.8;
    arm.material.opacity = anim.processingArms * 0.7 * (0.8 + 0.2 * Math.sin(t * 3 + i));
    arm.material.color.lerpColors(CYAN, WARM_WHITE, anim.colorTemp);
  }

  renderer.render(scene, camera);
}

// ─────────────────────────────────────────────
//  RESIZE HANDLER
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────
//  VOICE / SPEECH
// ─────────────────────────────────────────────
let recognition = null;
let isListening = false;
let synth = window.speechSynthesis;
let voices = [];
let selectedVoice = null;
let autoListen = false;
let wakeWordEnabled = true;
let responseTimer = null;
let isSpeaking = false;

// Load voices
function loadVoices() {
  voices = synth.getVoices();
  const sel = document.getElementById('voice-select');
  sel.innerHTML = '';
  voices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(opt);
  });
  // Try to pick a good default (English, not too robotic)
  const preferred = voices.findIndex(v =>
    (v.name.includes('Samantha') || v.name.includes('Karen') ||
     v.name.includes('Google US') || v.name.includes('Microsoft')) &&
    v.lang.startsWith('en')
  );
  if (preferred >= 0) {
    sel.value = preferred;
    selectedVoice = voices[preferred];
  } else {
    const enVoice = voices.findIndex(v => v.lang.startsWith('en'));
    if (enVoice >= 0) { sel.value = enVoice; selectedVoice = voices[enVoice]; }
  }
}

if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = loadVoices;
}
loadVoices();

document.getElementById('voice-select').addEventListener('change', (e) => {
  selectedVoice = voices[parseInt(e.target.value)];
});

function speak(text) {
  if (!text) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  if (selectedVoice) utt.voice = selectedVoice;
  utt.rate = 0.92;
  utt.pitch = 0.95;
  utt.volume = 1;

  utt.onstart = () => {
    isSpeaking = true;
    setSpeaking(0.5);
    // Simulate intensity variation during speech
    animateSpeakIntensity();
  };
  utt.onend = () => {
    isSpeaking = false;
    if (autoListen) {
      setTimeout(() => startListening(), 600);
    } else {
      setIdle();
    }
  };
  utt.onerror = () => { isSpeaking = false; setIdle(); };

  synth.speak(utt);
}

let speakAnimFrame = null;
function animateSpeakIntensity() {
  if (!isSpeaking) return;
  const i = 0.3 + Math.random() * 0.7;
  setSpeaking(i);
  speakAnimFrame = setTimeout(animateSpeakIntensity, 80 + Math.random() * 120);
}

function showResponse(text) {
  const el = document.getElementById('response-text');
  el.textContent = text;
  el.classList.add('visible');
  if (responseTimer) clearTimeout(responseTimer);
  responseTimer = setTimeout(() => el.classList.remove('visible'), 8000);
}

// ─────────────────────────────────────────────
//  SPEECH RECOGNITION
// ─────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  let finalTranscript = '';
  let listenTimeout = null;
  let activeSession = false;

  recognition.onresult = (event) => {
    let interim = '';
    finalTranscript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalTranscript += t;
      else interim += t;
    }

    // Wake word detection
    const combined = (finalTranscript + interim).toLowerCase();
    if (wakeWordEnabled && !activeSession && combined.includes('cool')) {
      activeSession = true;
      startListening(true);
      return;
    }

    if (activeSession && finalTranscript.trim().length > 2) {
      clearTimeout(listenTimeout);
      listenTimeout = setTimeout(() => {
        const query = finalTranscript.trim();
        if (query) processQuery(query);
        activeSession = false;
      }, 1000);
    }
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech') {
      isListening = false;
      activeSession = false;
      setIdle();
    }
  };

  recognition.onend = () => {
    if (isListening) {
      // Restart to keep continuous
      try { recognition.start(); } catch(e) {}
    }
  };
}

function startListening(fromWakeWord = false) {
  if (!recognition) return;
  if (isSpeaking) { synth.cancel(); isSpeaking = false; }
  setListening();
  document.getElementById('listen-ring').classList.add('active');

  if (!isListening) {
    isListening = true;
    try { recognition.start(); } catch(e) {}
  }

  // Auto-timeout after 10s
  setTimeout(() => {
    if (currentState === STATE.LISTENING) {
      stopListening();
    }
  }, 10000);
}

function stopListening() {
  document.getElementById('listen-ring').classList.remove('active');
  if (currentState === STATE.LISTENING) setIdle();
}

async function processQuery(text) {
  stopListening();
  setProcessing();

  try {
    const res = await fetch('/api/jarvis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    const reply = data.reply || data.response || data.message || 'Request received.';
    showResponse(reply);
    speak(reply);
  } catch (err) {
    const fallback = 'Unable to reach JARVIS core systems.';
    showResponse(fallback);
    speak(fallback);
  }
}

// ─────────────────────────────────────────────
//  ORB CLICK / TAP
// ─────────────────────────────────────────────
document.getElementById('orb-tap').addEventListener('click', () => {
  if (currentState === STATE.LISTENING) {
    stopListening();
  } else if (currentState === STATE.IDLE || currentState === STATE.SPEAKING) {
    startListening();
  }
});

// ─────────────────────────────────────────────
//  SETTINGS UI
// ─────────────────────────────────────────────
document.getElementById('gear-btn').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.add('open');
});
document.getElementById('close-settings').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.remove('open');
});

document.getElementById('auto-listen-toggle').addEventListener('change', (e) => {
  autoListen = e.target.checked;
});
document.getElementById('wake-word-toggle').addEventListener('change', (e) => {
  wakeWordEnabled = e.target.checked;
});

// Auto-start continuous recognition for wake word
if (recognition && wakeWordEnabled) {
  isListening = true;
  try { recognition.start(); } catch(e) {}
}

// ─────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────
setIdle();
animate();
</script>
</body>
</html>
