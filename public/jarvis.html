<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000308">
<title>J.A.R.V.I.S.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000308;
  font-family: 'Orbitron', monospace;
  color: #4DB3FF;
  touch-action: none;
  user-select: none;
}
#three-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
#ui {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 20px;
}
#header {
  text-align: center;
  margin-top: 10px;
}
#header h1 {
  font-size: clamp(16px, 3vw, 24px);
  font-weight: 900;
  letter-spacing: 0.3em;
  color: #80E5FF;
  text-shadow: 0 0 20px rgba(128, 229, 255, 0.8), 0 0 40px rgba(128, 229, 255, 0.4);
}
#header .subtitle {
  font-size: clamp(8px, 1.5vw, 11px);
  letter-spacing: 0.5em;
  color: #4DB3FF;
  opacity: 0.7;
  margin-top: 4px;
}
#response-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 20px;
  max-width: 600px;
  width: 100%;
}
#response-text {
  font-size: clamp(10px, 2vw, 14px);
  color: #80E5FF;
  text-align: center;
  line-height: 1.6;
  letter-spacing: 0.05em;
  text-shadow: 0 0 10px rgba(128, 229, 255, 0.6);
  opacity: 0;
  transition: opacity 0.5s;
  max-height: 150px;
  overflow: hidden;
  padding: 0 20px;
}
#response-text.visible { opacity: 1; }
#bottom-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}
#status-text {
  font-size: clamp(10px, 2vw, 14px);
  font-weight: 700;
  letter-spacing: 0.4em;
  color: #4DB3FF;
  text-shadow: 0 0 15px rgba(77, 179, 255, 0.8);
  transition: color 0.3s, text-shadow 0.3s;
}
#status-text.listening {
  color: #80E5FF;
  text-shadow: 0 0 20px rgba(128, 229, 255, 1), 0 0 40px rgba(128, 229, 255, 0.6);
}
#status-text.processing {
  color: #FFB347;
  text-shadow: 0 0 20px rgba(255, 179, 71, 0.8);
}
#status-text.speaking {
  color: #80FF80;
  text-shadow: 0 0 20px rgba(128, 255, 128, 0.8);
}
#tap-btn {
  pointer-events: all;
  background: transparent;
  border: 1px solid rgba(77, 179, 255, 0.4);
  color: #4DB3FF;
  font-family: 'Orbitron', monospace;
  font-size: clamp(9px, 1.5vw, 12px);
  letter-spacing: 0.3em;
  padding: 10px 30px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
}
#tap-btn:hover, #tap-btn.active {
  border-color: #80E5FF;
  color: #80E5FF;
  box-shadow: 0 0 20px rgba(128, 229, 255, 0.4);
  background: rgba(128, 229, 255, 0.05);
}
#wake-indicator {
  font-size: clamp(8px, 1.3vw, 10px);
  letter-spacing: 0.3em;
  color: rgba(77, 179, 255, 0.4);
  text-align: center;
}
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>
<div id="ui">
  <div id="header">
    <h1>J.A.R.V.I.S.</h1>
    <div class="subtitle">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
  </div>
  <div id="response-area">
    <div id="response-text"></div>
  </div>
  <div id="bottom-area">
    <div id="status-text">STANDBY</div>
    <button id="tap-btn">TAP TO SPEAK</button>
    <div id="wake-indicator">SAY "COOL" TO ACTIVATE</div>
  </div>
</div>

<script>
// ─── STATE ──────────────────────────────────────────────────────────────────
const State = { STANDBY: 'standby', LISTENING: 'listening', PROCESSING: 'processing', SPEAKING: 'speaking' };
let currentState = State.STANDBY;

function setState(s) {
  currentState = s;
  const el = document.getElementById('status-text');
  el.className = '';
  el.textContent = s.toUpperCase();
  if (s === State.LISTENING) el.classList.add('listening');
  if (s === State.PROCESSING) el.classList.add('processing');
  if (s === State.SPEAKING) el.classList.add('speaking');
}

// ─── THREE.JS SETUP ──────────────────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000308, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 10, 65);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── BACKGROUND GRID ─────────────────────────────────────────────────────────
{
  const gridGeo = new THREE.BufferGeometry();
  const verts = [];
  const gridSize = 120;
  const step = 12;
  for (let i = -gridSize; i <= gridSize; i += step) {
    verts.push(-gridSize, -30, i, gridSize, -30, i);
    verts.push(i, -30, -gridSize, i, -30, gridSize);
  }
  gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  const gridMat = new THREE.LineBasicMaterial({ color: 0x001133, transparent: true, opacity: 0.4 });
  scene.add(new THREE.LineSegments(gridGeo, gridMat));
}

// ─── CENTRAL CORE (r=8) ──────────────────────────────────────────────────────
const coreGroup = new THREE.Group();
scene.add(coreGroup);

// Outer cyan sphere
const outerCoreMat = new THREE.MeshBasicMaterial({
  color: 0x80E5FF,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const outerCoreMesh = new THREE.Mesh(new THREE.SphereGeometry(8, 32, 32), outerCoreMat);
coreGroup.add(outerCoreMesh);

// Inner white glimmer sphere (r*0.4 = 3.2)
const innerCoreMat = new THREE.MeshBasicMaterial({
  color: 0xFFFFFF,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const innerCoreMesh = new THREE.Mesh(new THREE.SphereGeometry(3.2, 24, 24), innerCoreMat);
coreGroup.add(innerCoreMesh);

// Glow halo
const glowMat = new THREE.MeshBasicMaterial({
  color: 0x80E5FF,
  transparent: true,
  opacity: 0.2,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  side: THREE.BackSide,
});
const glowMesh = new THREE.Mesh(new THREE.SphereGeometry(11, 24, 24), glowMat);
coreGroup.add(glowMesh);

// ─── WIREFRAME SHELL (r=15) ───────────────────────────────────────────────────
const wireGroup = new THREE.Group();
scene.add(wireGroup);

const wireMat = new THREE.LineBasicMaterial({
  color: 0x4DB3FF,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

// Helper: create a segmented circle (dashed appearance)
function createSegmentedRing(radius, segments, gapFraction, mat) {
  const group = new THREE.Group();
  const segmentArc = (Math.PI * 2) / segments;
  const gapArc = segmentArc * gapFraction;
  const drawArc = segmentArc - gapArc;
  const pointsPerSeg = 20;

  for (let s = 0; s < segments; s++) {
    const startAngle = s * segmentArc + gapArc / 2;
    const pts = [];
    for (let i = 0; i <= pointsPerSeg; i++) {
      const a = startAngle + (i / pointsPerSeg) * drawArc;
      pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    group.add(new THREE.Line(geo, mat));
  }
  return group;
}

// Vertical ribs: 12 rings rotated every 15° around Y axis
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI; // 0 to 180° (full sphere coverage with opposite)
  // Each rib = segmented circle in XY plane, then rotate
  const ribGroup = createSegmentedRing(15, 8, 0.25, wireMat);
  ribGroup.rotation.y = angle;
  // Rotate the ring from XZ to XY plane
  const ring = new THREE.Group();
  ribGroup.rotation.x = Math.PI / 2;
  ring.add(ribGroup);
  ring.rotation.y = angle;
  wireGroup.add(ring);
}

// Horizontal latitude rings
const latHeights = [-13, -10, -7, -4, 0, 4, 7, 10, 13];
latHeights.forEach(h => {
  const r = Math.sqrt(15 * 15 - h * h);
  if (r <= 0) return;
  const latGroup = createSegmentedRing(r, 6, 0.2, wireMat);
  latGroup.position.y = h;
  wireGroup.add(latGroup);
});

// ─── FRAGMENTED OUTER RINGS ───────────────────────────────────────────────────
const ringMat = new THREE.LineBasicMaterial({
  color: 0x33AAFF,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

// Helper: create a tube-like thick arc segment
function createArcSegment(radius, startAngle, arcLength, thickness) {
  const pts = [];
  const steps = 30;
  for (let i = 0; i <= steps; i++) {
    const a = startAngle + (i / steps) * arcLength;
    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, ringMat);
}

// Ring A: radius=20, 6 segments, tilt=[0,0,0]
const ringAGroup = new THREE.Group();
scene.add(ringAGroup);
{
  const segCount = 6;
  const totalArc = Math.PI * 2;
  const segArc = totalArc / segCount;
  const drawArc = (25 * Math.PI / 180); // 25° per segment
  for (let s = 0; s < segCount; s++) {
    const start = s * segArc;
    ringAGroup.add(createArcSegment(20, start, drawArc, 0.4));
  }
}

// Ring B: radius=22, 4 segments, tilt=[60,45,0]
const ringBGroup = new THREE.Group();
scene.add(ringBGroup);
ringBGroup.rotation.set(
  60 * Math.PI / 180,
  45 * Math.PI / 180,
  0
);
{
  const segCount = 4;
  const segArc = Math.PI * 2 / segCount;
  const drawArc = 25 * Math.PI / 180;
  for (let s = 0; s < segCount; s++) {
    const start = s * segArc;
    ringBGroup.add(createArcSegment(22, start, drawArc, 0.3));
  }
}

// Ring C: radius=24, 8 segments, tilt=[-30,80,10]
const ringCGroup = new THREE.Group();
scene.add(ringCGroup);
ringCGroup.rotation.set(
  -30 * Math.PI / 180,
  80 * Math.PI / 180,
  10 * Math.PI / 180
);
{
  const segCount = 8;
  const segArc = Math.PI * 2 / segCount;
  const drawArc = 25 * Math.PI / 180;
  for (let s = 0; s < segCount; s++) {
    const start = s * segArc;
    ringCGroup.add(createArcSegment(24, start, drawArc, 0.2));
  }
}

// ─── CORNER BRACKETS (size=28) ────────────────────────────────────────────────
const bracketMat = new THREE.LineBasicMaterial({
  color: 0x33AAFF,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

function createBracket(x, z) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  const len = 4;
  const sx = Math.sign(x);
  const sz = Math.sign(z);

  // Horizontal bar (along X)
  const hPts = [
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(-sx * len, 0, 0)
  ];
  const hGeo = new THREE.BufferGeometry().setFromPoints(hPts);
  group.add(new THREE.Line(hGeo, bracketMat));

  // Vertical bar (along Z)
  const vPts = [
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, -sz * len)
  ];
  const vGeo = new THREE.BufferGeometry().setFromPoints(vPts);
  group.add(new THREE.Line(vGeo, bracketMat));

  // Vertical height bar (Y)
  const yPts = [
    new THREE.Vector3(0, -2, 0),
    new THREE.Vector3(0, 2, 0)
  ];
  const yGeo = new THREE.BufferGeometry().setFromPoints(yPts);
  group.add(new THREE.Line(yGeo, bracketMat));

  return group;
}

[
  [28, 28], [28, -28], [-28, 28], [-28, -28]
].forEach(([x, z]) => {
  scene.add(createBracket(x, z));
});

// ─── PARTICLES (150 cyan dots) ────────────────────────────────────────────────
const particleCount = 150;
const particlePositions = new Float32Array(particleCount * 3);
const particleData = [];

// Distribute particles among 3 ring paths
for (let i = 0; i < particleCount; i++) {
  const ringIdx = i % 3;
  const radius = [20, 22, 24][ringIdx];
  const tilt = [[0,0,0],[60,45,0],[-30,80,10]][ringIdx];
  const angle = Math.random() * Math.PI * 2;
  const speed = (0.3 + Math.random() * 0.4) * (ringIdx === 0 ? 1 : ringIdx === 1 ? 0.7 : 0.5);

  particleData.push({ ringIdx, radius, angle, speed, tiltX: tilt[0]*Math.PI/180, tiltY: tilt[1]*Math.PI/180, tiltZ: tilt[2]*Math.PI/180 });

  // Initial position
  const x = Math.cos(angle) * radius;
  const z = Math.sin(angle) * radius;
  particlePositions[i * 3] = x;
  particlePositions[i * 3 + 1] = 0;
  particlePositions[i * 3 + 2] = z;
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x80E5FF,
  size: 0.5,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─── SCANNER PLANE (for PROCESSING state) ─────────────────────────────────────
const scannerMat = new THREE.MeshBasicMaterial({
  color: 0x33AAFF,
  transparent: true,
  opacity: 0,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  side: THREE.DoubleSide,
});
const scannerMesh = new THREE.Mesh(new THREE.PlaneGeometry(60, 0.4), scannerMat);
scene.add(scannerMesh);
let scannerY = -20;
let scannerDir = 1;

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
let clock = new THREE.Clock();
let pulsePhase = 0;
let ringAAngle = 0;
let ringBAngle = 0;
let ringCAngle = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  const isListening = currentState === State.LISTENING;
  const isProcessing = currentState === State.PROCESSING;
  const isSpeaking = currentState === State.SPEAKING;

  const speedMult = isListening ? 3 : 1;

  // Core pulse (5-7% scale breathing)
  pulsePhase += dt * (isSpeaking ? 4 : 2);
  const pulseScale = 1 + Math.sin(pulsePhase) * (isSpeaking ? 0.12 : 0.06);
  coreGroup.scale.setScalar(pulseScale);

  // Core brightness
  if (isListening) {
    outerCoreMat.opacity = 1.0;
    innerCoreMesh.scale.setScalar(1.5);
    innerCoreMat.opacity = 1.0;
  } else {
    outerCoreMat.opacity = 0.8;
    innerCoreMesh.scale.setScalar(1.0);
    innerCoreMat.opacity = 0.9;
  }

  // Wireframe shell slow rotation
  wireGroup.rotation.y += dt * 0.15;

  // Fragmented ring rotations (each on their tilted local axis)
  ringAAngle += dt * 0.4 * speedMult;
  ringBAngle += dt * 0.25 * speedMult;
  ringCAngle += dt * 0.18 * speedMult;
  ringAGroup.rotation.y = ringAAngle;
  // For B and C, we rotate around their local Y after tilt
  ringBGroup.rotation.y = 45 * Math.PI / 180 + ringBAngle;
  ringCGroup.rotation.y = 80 * Math.PI / 180 + ringCAngle;

  // Scanner effect (PROCESSING)
  if (isProcessing) {
    scannerMat.opacity = 0.35;
    scannerY += dt * 25 * scannerDir;
    if (scannerY > 20) scannerDir = -1;
    if (scannerY < -20) scannerDir = 1;
    scannerMesh.position.y = scannerY;
  } else {
    scannerMat.opacity = 0;
  }

  // Particles
  const pPos = particleGeo.attributes.position.array;
  const tmpVec = new THREE.Vector3();
  const tmpEuler = new THREE.Euler();
  const tmpMat = new THREE.Matrix4();

  for (let i = 0; i < particleCount; i++) {
    const pd = particleData[i];
    pd.angle += dt * pd.speed * speedMult * 0.3;

    // Position in ring local XZ plane
    const lx = Math.cos(pd.angle) * pd.radius;
    const lz = Math.sin(pd.angle) * pd.radius;
    tmpVec.set(lx, 0, lz);

    // Apply ring tilt using Euler
    tmpEuler.set(pd.tiltX, pd.tiltY, pd.tiltZ, 'XYZ');
    tmpMat.makeRotationFromEuler(tmpEuler);
    tmpVec.applyMatrix4(tmpMat);

    // Add spinning rotation around Y
    const ringYAngle = pd.ringIdx === 0 ? ringAAngle
                     : pd.ringIdx === 1 ? ringBAngle
                     : ringCAngle;
    const cosR = Math.cos(ringYAngle * 0.5);
    const sinR = Math.sin(ringYAngle * 0.5);
    const finalX = cosR * tmpVec.x - sinR * tmpVec.z;
    const finalZ = sinR * tmpVec.x + cosR * tmpVec.z;

    pPos[i * 3] = finalX;
    pPos[i * 3 + 1] = tmpVec.y;
    pPos[i * 3 + 2] = finalZ;
  }
  particleGeo.attributes.position.needsUpdate = true;

  // Particle opacity based on state
  particleMat.opacity = isListening ? 1.0 : isSpeaking ? 0.9 : 0.6;
  particleMat.size = isListening ? 0.8 : 0.5;

  // Slow camera bob
  camera.position.y = 10 + Math.sin(t * 0.2) * 2;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

// ─── VOICE ────────────────────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let wakeRecognition = null;
let isRecording = false;

const responseText = document.getElementById('response-text');
const tapBtn = document.getElementById('tap-btn');

function showResponse(text) {
  responseText.textContent = text;
  responseText.classList.add('visible');
}

function hideResponse() {
  responseText.classList.remove('visible');
}

function speak(text) {
  setState(State.SPEAKING);
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 1.0;
  utt.pitch = 0.9;
  // Try to find a good voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.toLowerCase().includes('google') && v.lang === 'en-US')
    || voices.find(v => v.lang === 'en-US')
    || voices[0];
  if (preferred) utt.voice = preferred;
  utt.onend = () => {
    setState(State.STANDBY);
    tapBtn.textContent = 'TAP TO SPEAK';
  };
  speechSynthesis.speak(utt);
}

async function sendToJarvis(text) {
  setState(State.PROCESSING);
  showResponse('');
  try {
    const res = await fetch('/api/jarvis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    const reply = data.reply || data.response || data.message || data.text || 'No response received.';
    showResponse(reply);
    speak(reply);
  } catch (e) {
    console.error('JARVIS API error:', e);
    const err = 'Systems offline. Unable to reach core.';
    showResponse(err);
    speak(err);
  }
}

function startListening() {
  if (!SpeechRecognition) {
    alert('Speech recognition not supported in this browser.');
    return;
  }
  if (isRecording) return;
  isRecording = true;
  setState(State.LISTENING);
  tapBtn.textContent = 'LISTENING...';
  tapBtn.classList.add('active');
  hideResponse();

  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    isRecording = false;
    tapBtn.classList.remove('active');
    tapBtn.textContent = 'TAP TO SPEAK';
    sendToJarvis(transcript);
  };

  recognition.onerror = (e) => {
    console.error('Recognition error:', e.error);
    isRecording = false;
    setState(State.STANDBY);
    tapBtn.classList.remove('active');
    tapBtn.textContent = 'TAP TO SPEAK';
  };

  recognition.onend = () => {
    if (isRecording) {
      isRecording = false;
      setState(State.STANDBY);
      tapBtn.classList.remove('active');
      tapBtn.textContent = 'TAP TO SPEAK';
    }
  };

  recognition.start();
}

tapBtn.addEventListener('click', startListening);

// Wake word "Cool" via continuous recognition
function startWakeWord() {
  if (!SpeechRecognition) return;

  wakeRecognition = new SpeechRecognition();
  wakeRecognition.lang = 'en-US';
  wakeRecognition.continuous = true;
  wakeRecognition.interimResults = false;

  wakeRecognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript.toLowerCase().trim();
      if (transcript.includes('cool') && !isRecording && currentState === State.STANDBY) {
        startListening();
        break;
      }
    }
  };

  wakeRecognition.onend = () => {
    // Auto-restart for continuous wake word detection
    if (currentState !== State.LISTENING) {
      setTimeout(() => {
        try { wakeRecognition.start(); } catch(e) {}
      }, 500);
    }
  };

  wakeRecognition.onerror = () => {
    setTimeout(() => {
      try { wakeRecognition.start(); } catch(e) {}
    }, 1000);
  };

  try { wakeRecognition.start(); } catch(e) {}
}

// Start wake word after page load
window.addEventListener('load', () => {
  // Load voices async
  speechSynthesis.onvoiceschanged = () => {};
  startWakeWord();
});
</script>
</body>
</html>
