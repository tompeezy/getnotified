<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000308">
<title>J.A.R.V.I.S.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000308;
  font-family: 'Orbitron', monospace;
  color: #4DB3FF;
  touch-action: none;
  user-select: none;
}
#three-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
#ui {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 20px;
}
#header {
  text-align: center;
  margin-top: 10px;
}
#header h1 {
  font-size: clamp(16px, 3vw, 24px);
  font-weight: 900;
  letter-spacing: 0.3em;
  color: #80E5FF;
  text-shadow: 0 0 20px rgba(128,229,255,0.8), 0 0 40px rgba(128,229,255,0.4);
}
#header .subtitle {
  font-size: clamp(8px, 1.5vw, 11px);
  letter-spacing: 0.5em;
  color: #4DB3FF;
  opacity: 0.7;
  margin-top: 4px;
}
#response-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 20px;
  max-width: 600px;
  width: 100%;
}
#response-text {
  font-size: clamp(10px, 2vw, 14px);
  color: #80E5FF;
  text-align: center;
  line-height: 1.6;
  letter-spacing: 0.05em;
  text-shadow: 0 0 10px rgba(128,229,255,0.6);
  opacity: 0;
  transition: opacity 0.5s;
  max-height: 150px;
  overflow: hidden;
  padding: 0 20px;
}
#response-text.visible { opacity: 1; }
#bottom-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}
#status-text {
  font-size: clamp(10px, 2vw, 14px);
  font-weight: 700;
  letter-spacing: 0.4em;
  color: #4DB3FF;
  text-shadow: 0 0 15px rgba(77,179,255,0.8);
  transition: color 0.3s, text-shadow 0.3s;
}
#status-text.listening {
  color: #80E5FF;
  text-shadow: 0 0 20px rgba(128,229,255,1), 0 0 40px rgba(128,229,255,0.6);
}
#status-text.processing {
  color: #FFB347;
  text-shadow: 0 0 20px rgba(255,179,71,0.8);
}
#status-text.speaking {
  color: #80FF80;
  text-shadow: 0 0 20px rgba(128,255,128,0.8);
}
#tap-btn {
  pointer-events: all;
  background: transparent;
  border: 1px solid rgba(77,179,255,0.4);
  color: #4DB3FF;
  font-family: 'Orbitron', monospace;
  font-size: clamp(9px, 1.5vw, 12px);
  letter-spacing: 0.3em;
  padding: 10px 30px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
}
#tap-btn:hover, #tap-btn.active {
  border-color: #80E5FF;
  color: #80E5FF;
  box-shadow: 0 0 20px rgba(128,229,255,0.4);
  background: rgba(128,229,255,0.05);
}
#wake-indicator {
  font-size: clamp(8px, 1.3vw, 10px);
  letter-spacing: 0.3em;
  color: rgba(77,179,255,0.4);
  text-align: center;
}
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>
<div id="ui">
  <div id="header">
    <h1>J.A.R.V.I.S.</h1>
    <div class="subtitle">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
  </div>
  <div id="response-area">
    <div id="response-text"></div>
  </div>
  <div id="bottom-area">
    <div id="status-text">STANDBY</div>
    <button id="tap-btn">TAP TO SPEAK</button>
    <div id="wake-indicator">SAY "COOL" TO ACTIVATE</div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const State = { STANDBY:'standby', LISTENING:'listening', PROCESSING:'processing', SPEAKING:'speaking' };
let currentState = State.STANDBY;

function setState(s) {
  currentState = s;
  const el = document.getElementById('status-text');
  el.className = '';
  el.textContent = s.toUpperCase();
  if (s === State.LISTENING)   el.classList.add('listening');
  if (s === State.PROCESSING)  el.classList.add('processing');
  if (s === State.SPEAKING)    el.classList.add('speaking');
}

// ─── THREE.JS SETUP ──────────────────────────────────────────────────────────
const DEG = Math.PI / 180;

const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000308, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 10, 68);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── MATERIAL FACTORIES ──────────────────────────────────────────────────────
function mkMeshMat(color, opacity, backSide) {
  return new THREE.MeshBasicMaterial({
    color, transparent: true, opacity,
    blending: THREE.AdditiveBlending, depthWrite: false,
    side: backSide ? THREE.BackSide : THREE.FrontSide
  });
}

function mkLineMat(color, opacity) {
  return new THREE.LineBasicMaterial({
    color, transparent: true, opacity,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
}

// ─── LINE HELPERS ────────────────────────────────────────────────────────────
function makeLine(pts, mat) {
  return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
}

function circlePoints(radius, segments) {
  segments = segments || 64;
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const a = (i / segments) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
  }
  return pts;
}

function arcPoints(radius, startDeg, arcDeg, steps) {
  steps = steps || 30;
  const pts = [];
  const s0 = startDeg * DEG;
  const arc = arcDeg * DEG;
  for (let i = 0; i <= steps; i++) {
    const a = s0 + (i / steps) * arc;
    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
  }
  return pts;
}

// Build a group of uniform arc segments in the XZ plane
function uniformRing(radius, numSegs, arcDeg, gapDeg, mat) {
  const g = new THREE.Group();
  let angle = 0;
  for (let s = 0; s < numSegs; s++) {
    g.add(makeLine(arcPoints(radius, angle, arcDeg), mat));
    angle += arcDeg + gapDeg;
  }
  return g;
}

// Build a group of UNEVEN arc segments (the AI movie look)
function unevenRing(radius, arcsDeg, gapsDeg, offsetDeg, mat) {
  const g = new THREE.Group();
  let angle = offsetDeg;
  for (let s = 0; s < arcsDeg.length; s++) {
    g.add(makeLine(arcPoints(radius, angle, arcsDeg[s]), mat));
    angle += arcsDeg[s] + gapsDeg[s];
  }
  return g;
}

// ─── BACKGROUND GRID ─────────────────────────────────────────────────────────
{
  const verts = [];
  const gs = 120, step = 12;
  for (let i = -gs; i <= gs; i += step) {
    verts.push(-gs, -32, i,  gs, -32, i);
    verts.push(i,   -32, -gs, i, -32, gs);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  scene.add(new THREE.LineSegments(geo, mkLineMat(0x001133, 0.35)));
}

// ─── 1. CENTRAL CORE ─────────────────────────────────────────────────────────
const coreGroup = new THREE.Group();
scene.add(coreGroup);

// Main sphere r=8
const coreMat = mkMeshMat(0x73F2FF, 0.95);
coreGroup.add(new THREE.Mesh(new THREE.SphereGeometry(8, 32, 32), coreMat));

// Inner white core r=2.8
const innerCoreMat = mkMeshMat(0xFFFFFF, 0.95);
coreGroup.add(new THREE.Mesh(new THREE.SphereGeometry(2.8, 24, 24), innerCoreMat));

// Glow shell 1: r=10, #B3FFFF, opacity 0.20, backside
const glowMat1 = mkMeshMat(0xB3FFFF, 0.20, true);
coreGroup.add(new THREE.Mesh(new THREE.SphereGeometry(10, 24, 24), glowMat1));

// Glow shell 2: r=12.4, cyan, opacity 0.08, backside
const glowMat2 = mkMeshMat(0x00FFFF, 0.08, true);
coreGroup.add(new THREE.Mesh(new THREE.SphereGeometry(12.4, 24, 24), glowMat2));

// Equatorial scan ring: torus r=8.4, tube=0.18, scanline color
const scanlineMat = new THREE.MeshBasicMaterial({
  color: 0x99E5FF, transparent: true, opacity: 0.22,
  blending: THREE.AdditiveBlending, depthWrite: false
});
const equatRing = new THREE.Mesh(new THREE.TorusGeometry(8.4, 0.18, 8, 64), scanlineMat.clone());
coreGroup.add(equatRing);

// Vertical scan ring (rotated 90° on X)
const vertRing = new THREE.Mesh(new THREE.TorusGeometry(8.4, 0.18, 8, 64), scanlineMat.clone());
vertRing.rotation.x = Math.PI / 2;
coreGroup.add(vertRing);

// Micro-orbit ring: r=6.24, tube=0.10, rotated [35,20,0]
const microMat = new THREE.MeshBasicMaterial({
  color: 0x73F2FF, transparent: true, opacity: 0.35,
  blending: THREE.AdditiveBlending, depthWrite: false
});
const microRing = new THREE.Mesh(new THREE.TorusGeometry(6.24, 0.10, 6, 48), microMat);
microRing.rotation.set(35 * DEG, 20 * DEG, 0);
coreGroup.add(microRing);

// ─── 2. HOLOGRAPHIC SHELL (r=15) ─────────────────────────────────────────────
const shellGroup = new THREE.Group();
scene.add(shellGroup);

const shellMeshMat = new THREE.MeshBasicMaterial({
  color: 0x4DB3FF, transparent: true, opacity: 0.28,
  blending: THREE.AdditiveBlending, depthWrite: false
});

// Major spherical ribs — Y-axis meridians at [0,30,60,90,120,150]
[0,30,60,90,120,150].forEach(deg => {
  const torus = new THREE.Mesh(new THREE.TorusGeometry(15, 0.13, 8, 80), shellMeshMat);
  torus.rotation.y = deg * DEG;
  shellGroup.add(torus);
});

// Major spherical ribs — X-axis tilted great circles at [0,30,60,90,120,150]
[0,30,60,90,120,150].forEach(deg => {
  const torus = new THREE.Mesh(new THREE.TorusGeometry(15, 0.13, 8, 80), shellMeshMat);
  torus.rotation.x = Math.PI / 2;          // start horizontal
  torus.rotation.y = deg * DEG;            // rotate to create tilted great circles
  shellGroup.add(torus);
});

// Latitude rings at y-heights [-12,-9,-6,-3,0,3,6,9,12]
const latMeshMat = new THREE.MeshBasicMaterial({
  color: 0x4DB3FF, transparent: true, opacity: 0.22,
  blending: THREE.AdditiveBlending, depthWrite: false
});
[-12,-9,-6,-3,0,3,6,9,12].forEach(h => {
  const r = Math.sqrt(15*15 - h*h);
  if (r < 0.5) return;
  const torus = new THREE.Mesh(new THREE.TorusGeometry(r, 0.13, 8, 64), latMeshMat);
  torus.rotation.x = Math.PI / 2;
  torus.position.y = h;
  shellGroup.add(torus);
});

// Segmented partial ring 1: r=13.8, 9 segs, arc=18°, gap=18°, tilt=[0,90,35]
const partMat = mkLineMat(0x4DB3FF, 0.55);
const partial1 = uniformRing(13.8, 9, 18, 18, partMat);
partial1.rotation.set(0, 90*DEG, 35*DEG);
shellGroup.add(partial1);

// Segmented partial ring 2: r=13.2, 10 segs, arc=12°, gap=20°, tilt=[90,20,0]
const partial2 = uniformRing(13.2, 10, 12, 20, partMat);
partial2.rotation.set(90*DEG, 20*DEG, 0);
shellGroup.add(partial2);

// ─── 3. UNEVEN SEGMENTED OUTER RINGS (KEY FEATURE) ───────────────────────────
const UNEVEN_ARCS = [18,26,12,20,32,15,22,10];
const UNEVEN_GAPS = [10,14, 8,16,12, 9,18,11];

// Ring A: r=19, tilt=[0,0,0]
const ringAGroup = new THREE.Group();
ringAGroup.add(unevenRing(19, UNEVEN_ARCS, UNEVEN_GAPS, 0, mkLineMat(0x33A6FF, 0.85)));
scene.add(ringAGroup);

// Ring B: r=21.5, offset 45°, tilt=[60,45,0]
const ringBGroup = new THREE.Group();
ringBGroup.add(unevenRing(21.5, UNEVEN_ARCS, UNEVEN_GAPS, 45, mkLineMat(0x33A6FF, 0.85)));
scene.add(ringBGroup);

// Ring C: r=24.5, offset 90°, tilt=[-30,80,10]
const ringCGroup = new THREE.Group();
ringCGroup.add(unevenRing(24.5, UNEVEN_ARCS, UNEVEN_GAPS, 90, mkLineMat(0x33A6FF, 0.85)));
scene.add(ringCGroup);

// ─── 5. FLOATING UI RINGS ────────────────────────────────────────────────────
// Ring 1: r=19, 10 segs, arc=24°, gap=12°, tilt=[0,0,0]
const uiRing1 = new THREE.Group();
uiRing1.add(uniformRing(19, 10, 24, 12, mkLineMat(0x3FB8FF, 0.92)));
scene.add(uiRing1);

// Ring 2 (UNEVEN): r=21.5, tilt=[55,30,12]
const uiRing2 = new THREE.Group();
uiRing2.add(unevenRing(21.5, UNEVEN_ARCS, UNEVEN_GAPS, 0, mkLineMat(0x4DCCFF, 0.78)));
scene.add(uiRing2);

// Ring 3: r=24.5, 20 segs, arc=10°, gap=8°, tilt=[-28,78,18]
const uiRing3 = new THREE.Group();
uiRing3.add(uniformRing(24.5, 20, 10, 8, mkLineMat(0xB3F2FF, 0.55)));
scene.add(uiRing3);

// Ring 4: r=17.3, 11 segs, arc=16°, gap=16°, tilt=[90,0,24] — very faint
const uiRing4 = new THREE.Group();
uiRing4.add(uniformRing(17.3, 11, 16, 16, mkLineMat(0x99F2FF, 0.25)));
scene.add(uiRing4);

// Ring 5: r=18.2, 18 segs, arc=8°, gap=10°, tilt=[0,90,-10] — very faint
const uiRing5 = new THREE.Group();
uiRing5.add(uniformRing(18.2, 18, 8, 10, mkLineMat(0x99E5FF, 0.18)));
scene.add(uiRing5);

// ─── 6. FLOATING UI TICKS ────────────────────────────────────────────────────
// Main ticks: every 20° around equator at r=26
const mainTickGroup = new THREE.Group();
scene.add(mainTickGroup);
const mainTickMat = mkLineMat(0x73D9FF, 0.82);

for (let deg = 0; deg < 360; deg += 20) {
  const a = deg * DEG;
  const isMajor = (deg % 60 === 0);
  const is40    = (!isMajor && deg % 40 === 0);
  const innerR  = is40 ? 26.8 : 26.0;
  const outerR  = innerR + (isMajor ? 4.5 : 2.2);
  mainTickGroup.add(makeLine([
    new THREE.Vector3(Math.cos(a) * innerR, 0, Math.sin(a) * innerR),
    new THREE.Vector3(Math.cos(a) * outerR, 0, Math.sin(a) * outerR)
  ], mainTickMat));
}

// Secondary ticks at r=23.8, tilted [65,20,0]
const secTickGroup = new THREE.Group();
scene.add(secTickGroup);
const secTickMat = mkLineMat(0xCCFFFF, 0.35);
for (let deg = 0; deg < 360; deg += 20) {
  const a = deg * DEG;
  secTickGroup.add(makeLine([
    new THREE.Vector3(Math.cos(a) * 23.8, 0, Math.sin(a) * 23.8),
    new THREE.Vector3(Math.cos(a) * 25.3, 0, Math.sin(a) * 25.3)
  ], secTickMat));
}
secTickGroup.rotation.set(65*DEG, 20*DEG, 0);

// ─── 7. CORNER BRACKETS — 8 brackets at corners of a box ─────────────────────
const bracketMat = mkLineMat(0x73D9FF, 0.90);

function createBracket(x, y, z, rotY) {
  const g = new THREE.Group();
  g.position.set(x, y, z);
  g.rotation.y = rotY;
  const sx = x > 0 ? 1 : -1;
  const sz = z > 0 ? 1 : -1;
  const len = 4.5;
  // Horizontal bar (X direction)
  g.add(makeLine([new THREE.Vector3(0,0,0), new THREE.Vector3(-sx*len, 0, 0)], bracketMat));
  // Depth bar (Z direction)
  g.add(makeLine([new THREE.Vector3(0,0,0), new THREE.Vector3(0, 0, -sz*len)], bracketMat));
  // Height indicator
  g.add(makeLine([new THREE.Vector3(0,-1.5,0), new THREE.Vector3(0,1.5,0)], bracketMat));
  return g;
}

const bSize = 28;
const bS = bSize * 0.58;  // 16.24
const bY = bSize * 0.18;  // 5.04
[
  [bS, bY, bS], [bS, bY,-bS], [-bS, bY, bS], [-bS, bY,-bS],
  [bS,-bY, bS], [bS,-bY,-bS], [-bS,-bY, bS], [-bS,-bY,-bS]
].forEach(([x, y, z]) => {
  scene.add(createBracket(x, y, z, y > 0 ? 25*DEG : -25*DEG));
});

// ─── 8. SATELLITE NODES (4 small glowing spheres) ────────────────────────────
const satMat = new THREE.MeshBasicMaterial({
  color: 0xD9FFFF, transparent: true, opacity: 0.55,
  blending: THREE.AdditiveBlending, depthWrite: false
});
[[10,0,0],[-8,5,3],[0,-9,-4],[4,7,-8]].forEach(([x,y,z]) => {
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.55, 12, 12), satMat.clone());
  m.position.set(x, y, z);
  scene.add(m);
});

// ─── PARTICLES (180 cyan dots on outer ring paths) ────────────────────────────
const pCount = 180;
const pPositions = new Float32Array(pCount * 3);
const pData = [];
const ringPaths = [
  { radius: 19,   tilt: [0,      0,       0],      speed: 0.40 },
  { radius: 21.5, tilt: [60*DEG, 45*DEG,  0],      speed: 0.28 },
  { radius: 24.5, tilt: [-30*DEG,80*DEG, 10*DEG],  speed: 0.18 }
];
for (let i = 0; i < pCount; i++) {
  const ri   = i % 3;
  const rp   = ringPaths[ri];
  const ang  = Math.random() * Math.PI * 2;
  const spd  = rp.speed * (0.7 + Math.random() * 0.6);
  pData.push({ ri, radius: rp.radius, angle: ang, speed: spd, tilt: rp.tilt });
  pPositions[i*3]   = Math.cos(ang) * rp.radius;
  pPositions[i*3+1] = 0;
  pPositions[i*3+2] = Math.sin(ang) * rp.radius;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const pMat = new THREE.PointsMaterial({
  color: 0x80E5FF, size: 0.5, transparent: true, opacity: 0.8,
  blending: THREE.AdditiveBlending, depthWrite: false
});
scene.add(new THREE.Points(pGeo, pMat));

// ─── PROCESSING SCANNER PLANE ─────────────────────────────────────────────────
const scanMat = new THREE.MeshBasicMaterial({
  color: 0x33A6FF, transparent: true, opacity: 0,
  blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
});
const scanMesh = new THREE.Mesh(new THREE.PlaneGeometry(60, 0.4), scanMat);
scene.add(scanMesh);
let scanY = -20, scanDir = 1;

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let ringAAngle = 0, ringBAngle = 0, ringCAngle = 0;
let uiR1A = 0, uiR2A = 0, uiR3A = 0, uiR4A = 0, uiR5A = 0;
let pulsePhase = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t  = clock.getElapsedTime();

  const isL = currentState === State.LISTENING;
  const isP = currentState === State.PROCESSING;
  const isS = currentState === State.SPEAKING;
  const spd = isL ? 3.0 : 1.0;

  // ── Core breathing pulse ──────────────────────────────────────────────────
  pulsePhase += dt * (isS ? 4.0 : 2.0);
  const pulse = 1.0 + Math.sin(pulsePhase) * (isS ? 0.12 : 0.06);
  coreGroup.scale.setScalar(pulse * (isL ? 1.2 : 1.0));

  // Core brightness changes for LISTENING
  coreMat.opacity     = isL ? 1.00 : 0.95;
  innerCoreMat.opacity = isL ? 1.00 : 0.95;
  glowMat1.opacity    = isL ? 0.38 : 0.20;
  glowMat2.opacity    = isL ? 0.15 : 0.08;

  // Core scan rings gyroscope motion
  equatRing.rotation.z += dt * 0.30 * spd;
  vertRing.rotation.z  += dt * 0.20 * spd;
  microRing.rotation.z += dt * 0.55 * spd;

  // ── Holographic shell ─────────────────────────────────────────────────────
  shellGroup.rotation.y += dt * 0.10;
  shellGroup.rotation.x += dt * 0.04;

  // ── Uneven outer rings (each spins on its tilted axis) ─────────────────────
  ringAAngle += dt * 0.40 * spd;
  ringBAngle += dt * 0.25 * spd;
  ringCAngle += dt * 0.18 * spd;
  ringAGroup.rotation.set(0,          ringAAngle,              0);
  ringBGroup.rotation.set( 60*DEG,    45*DEG + ringBAngle,     0);
  ringCGroup.rotation.set(-30*DEG,    80*DEG + ringCAngle,     10*DEG);

  // ── Floating UI rings ─────────────────────────────────────────────────────
  uiR1A += dt * 0.35 * spd;
  uiR2A += dt * 0.22 * spd;
  uiR3A += dt * 0.15 * spd;
  uiR4A -= dt * 0.30 * spd;   // counter-rotate for depth
  uiR5A += dt * 0.48 * spd;
  uiRing1.rotation.set( 0,       uiR1A,             0);
  uiRing2.rotation.set( 55*DEG,  30*DEG + uiR2A,    12*DEG);
  uiRing3.rotation.set(-28*DEG,  78*DEG + uiR3A,    18*DEG);
  uiRing4.rotation.set( 90*DEG,  uiR4A,             24*DEG);
  uiRing5.rotation.set( 0,       90*DEG + uiR5A,   -10*DEG);

  // ── Tick rings ────────────────────────────────────────────────────────────
  mainTickGroup.rotation.y += dt * 0.05 * spd;
  secTickGroup.rotation.set(65*DEG, 20*DEG + t * 0.08, 0);

  // ── Processing scanner ────────────────────────────────────────────────────
  if (isP) {
    scanMat.opacity = 0.35;
    scanY += dt * 25 * scanDir;
    if (scanY >  20) scanDir = -1;
    if (scanY < -20) scanDir =  1;
    scanMesh.position.y = scanY;
  } else {
    scanMat.opacity = 0;
  }

  // ── Particles ─────────────────────────────────────────────────────────────
  const pos = pGeo.attributes.position.array;
  const tmpV = new THREE.Vector3();
  const tmpM = new THREE.Matrix4();
  const tmpE = new THREE.Euler();

  for (let i = 0; i < pCount; i++) {
    const pd = pData[i];
    pd.angle += dt * pd.speed * spd * 0.3;
    const lx = Math.cos(pd.angle) * pd.radius;
    const lz = Math.sin(pd.angle) * pd.radius;
    tmpV.set(lx, 0, lz);
    tmpE.set(pd.tilt[0], pd.tilt[1], pd.tilt[2], 'XYZ');
    tmpM.makeRotationFromEuler(tmpE);
    tmpV.applyMatrix4(tmpM);
    // add ring's own Y rotation
    const rAng = pd.ri === 0 ? ringAAngle : pd.ri === 1 ? ringBAngle : ringCAngle;
    const cx = Math.cos(rAng * 0.5), sx = Math.sin(rAng * 0.5);
    const fx = cx * tmpV.x - sx * tmpV.z;
    const fz = sx * tmpV.x + cx * tmpV.z;
    pos[i*3]   = fx;
    pos[i*3+1] = tmpV.y;
    pos[i*3+2] = fz;
  }
  pGeo.attributes.position.needsUpdate = true;
  pMat.opacity = isL ? 1.0 : isS ? 0.9 : 0.6;
  pMat.size    = isL ? 0.8 : 0.5;

  // ── Camera slow bob ───────────────────────────────────────────────────────
  camera.position.y = 10 + Math.sin(t * 0.2) * 2;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

// ─── VOICE ────────────────────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null, wakeRecognition = null, isRecording = false;
const responseText = document.getElementById('response-text');
const tapBtn = document.getElementById('tap-btn');

function showResponse(text) { responseText.textContent = text; responseText.classList.add('visible'); }
function hideResponse() { responseText.classList.remove('visible'); }

function speak(text) {
  setState(State.SPEAKING);
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 1.0; utt.pitch = 0.9;
  const voices = speechSynthesis.getVoices();
  const pref = voices.find(v => v.name.toLowerCase().includes('google') && v.lang === 'en-US')
             || voices.find(v => v.lang === 'en-US') || voices[0];
  if (pref) utt.voice = pref;
  utt.onend = () => { setState(State.STANDBY); tapBtn.textContent = 'TAP TO SPEAK'; };
  speechSynthesis.speak(utt);
}

async function sendToJarvis(text) {
  setState(State.PROCESSING);
  showResponse('');
  try {
    const res = await fetch('/api/jarvis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    const reply = data.reply || data.response || data.message || data.text || 'No response received.';
    showResponse(reply);
    speak(reply);
  } catch(e) {
    const err = 'Systems offline. Unable to reach core.';
    showResponse(err);
    speak(err);
  }
}

function startListening() {
  if (!SpeechRecognition) { alert('Speech recognition not supported in this browser.'); return; }
  if (isRecording) return;
  isRecording = true;
  setState(State.LISTENING);
  tapBtn.textContent = 'LISTENING...';
  tapBtn.classList.add('active');
  hideResponse();

  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    isRecording = false;
    tapBtn.classList.remove('active');
    tapBtn.textContent = 'TAP TO SPEAK';
    sendToJarvis(transcript);
  };
  recognition.onerror = () => {
    isRecording = false;
    setState(State.STANDBY);
    tapBtn.classList.remove('active');
    tapBtn.textContent = 'TAP TO SPEAK';
  };
  recognition.onend = () => {
    if (isRecording) {
      isRecording = false;
      setState(State.STANDBY);
      tapBtn.classList.remove('active');
      tapBtn.textContent = 'TAP TO SPEAK';
    }
  };
  recognition.start();
}

tapBtn.addEventListener('click', startListening);

function startWakeWord() {
  if (!SpeechRecognition) return;
  wakeRecognition = new SpeechRecognition();
  wakeRecognition.lang = 'en-US';
  wakeRecognition.continuous = true;
  wakeRecognition.interimResults = false;
  wakeRecognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript.toLowerCase().trim();
      if (t.includes('cool') && !isRecording && currentState === State.STANDBY) {
        startListening(); break;
      }
    }
  };
  wakeRecognition.onend = () => {
    if (currentState !== State.LISTENING) {
      setTimeout(() => { try { wakeRecognition.start(); } catch(e) {} }, 500);
    }
  };
  wakeRecognition.onerror = () => {
    setTimeout(() => { try { wakeRecognition.start(); } catch(e) {} }, 1000);
  };
  try { wakeRecognition.start(); } catch(e) {}
}

window.addEventListener('load', () => {
  speechSynthesis.onvoiceschanged = () => {};
  startWakeWord();
});
</script>
